# Run the full pytest suite (with coverage) on every push and pull request.
name: pytest

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.8 matches the project Dockerfile; 3.12 is a current stable check
        python-version: ["3.8", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Full pytest log + coverage table appear in this step's log on GitHub Actions.
      # Open the job → "Run tests with coverage" to expand the output.
      - name: Run tests with coverage
        run: |
          python -m pytest -v \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      # Downloadable HTML report (job summary page → Artifacts)
      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: ignore
